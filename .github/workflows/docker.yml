name: Build and push Docker image to GHCR

on:
  push:
    branches:
      - sandbox
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: ghcr.io
  # github.repository = owner/repo-name
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Log in to GHCR using the built-in GITHUB_TOKEN
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate tags and labels from Git metadata
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # tag :latest on default branch pushes
            type=raw,value=latest,enable={{is_default_branch}}
            # tag :sandbox on branch pushes
            type=ref,event=branch
            # semver tags  e.g. v1.2.3 → :1.2.3, :1.2, :1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # short git SHA for traceability
            type=sha,prefix=sha-,format=short

      # Set up QEMU for multi-arch (linux/amd64 is enough for RunPod)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Use BuildKit for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and push (skip push on PRs)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache backed by GitHub Actions cache
          cache-from: type=gha
          cache-to: type=gha,mode=max
